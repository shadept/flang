[project]
name = "flang"
version = "0.1.0"
kind = "exe"
source = "src/**/*.f"
output = "build"

[dependencies]
flang_parser = { path = "../lib/flang_parser" }
flang_core = { path = "../lib/flang_core" }
flang_typer = { path = "../lib/flang_typer" }
flang_codegen = { path = "../lib/flang_codegen" }
flang_driver = { path = "../lib/flang_driver" }
